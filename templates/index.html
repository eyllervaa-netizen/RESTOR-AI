<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTOR-AI</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="header">

        <h1>🏛️ RESTOR-AI</h1>

        <p>
            Yapay Zeka Destekli Tarihi Yapı Restorasyon
            Karar Destek Sistemi
        </p>

    </div>

    <div class="upload-card">

        <form action="/upload" method="POST" enctype="multipart/form-data">

            <label>Yapı Adı (İsteğe Bağlı)</label>

            <input
                type="text"
                name="building_name"
                placeholder="Örn: Selimiye Camii">

            <label>Fotoğraf Yükle</label>

            <input
                type="file"
                name="photo"
                accept=".jpg,.jpeg,.png,.bmp,.tif,.tiff"
                required>

            <button type="submit">

                🔍 Analiz Et

            </button>

        </form>

    </div>

    <div class="info">

        <h2>Uygulama Otomatik Olarak Analiz Eder</h2>

        <ul>

            <li>✅ Malzeme Durumu (Tahmini)</li>

            <li>✅ Hasar Seviyesi</li>

            <li>✅ Taşıyıcı Sistem Riski</li>

            <li>✅ Çatlak Yoğunluğu</li>

            <li>✅ Risk Puanı</li>

            <li>✅ Müdahale Önceliği</li>

            <li>✅ Restorasyon Senaryosu</li>

        </ul>

    </div>

</div>

</body>

</html>
